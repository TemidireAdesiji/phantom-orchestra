name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  POETRY_VERSION: "1.8.3"

jobs:
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install linting tools
        run: pip install ruff mypy types-toml structlog pydantic
      - name: Ruff lint check
        run: ruff check phantom/ tests/
      - name: Ruff format check
        run: ruff format --check phantom/ tests/
      - name: mypy type check
        run: mypy phantom/ --ignore-missing-imports --no-strict-optional

  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: >-
            venv-${{ matrix.python-version }}-
            ${{ hashFiles('pyproject.toml') }}
          restore-keys: venv-${{ matrix.python-version }}-
      - name: Install dependencies
        run: poetry install --with dev --no-interaction
      - name: Run unit tests with coverage
        run: |
          poetry run pytest tests/unit \
            -v \
            --cov=phantom \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70
      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: poetry install --with dev --no-interaction
      - name: Run integration tests
        run: |
          poetry run pytest tests/integration \
            -v \
            --timeout=60

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/app/Dockerfile
          push: false
          tags: phantom-orchestra:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
